version: 2

updates:
  # ── npm packages (Next.js dashboard) ────────────────────────────────────────
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      # Bundle minor + patch updates for React/Next into one PR
      nextjs-react:
        patterns: ["next", "react", "react-dom"]
        update-types: ["minor", "patch"]
      # Bundle all other deps
      all-deps:
        patterns: ["*"]
        update-types: ["patch"]
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"

  # ── pip packages (Python agents) ────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
